<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 675" role="img" aria-labelledby="title desc">
  <title id="title">iPracticeMusic App Version 2.0 demonstration</title>
  <desc id="desc">A navy and blue practice screen with musical notes and a Version 2.0 label.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0d2d52"/>
      <stop offset="1" stop-color="#1d5da1"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="675" rx="42" fill="url(#bg)"/>
  <circle cx="160" cy="150" r="86" fill="#fff" opacity=".96"/>
  <text x="160" y="184" text-anchor="middle" font-size="112" font-family="Arial, sans-serif" font-weight="700" fill="#111827">♪</text>
  <text x="280" y="170" font-size="76" font-family="Arial, sans-serif" font-weight="800" fill="#fff">iPracticeMusic App</text>
  <text x="284" y="224" font-size="34" font-family="Arial, sans-serif" font-weight="600" fill="#d8e8fa">Practice: Anytime, Anywhere</text>
  <rect x="112" y="310" width="976" height="190" rx="30" fill="#fff" opacity=".12" stroke="#fff" stroke-opacity=".28" stroke-width="3"/>
  <text x="600" y="390" text-anchor="middle" font-size="62" font-family="Arial, sans-serif" font-weight="800" fill="#fff">VERSION 2.0</text>
  <text x="600" y="452" text-anchor="middle" font-size="29" font-family="Arial, sans-serif" fill="#e5f0fc">Synchronized tracks • Video • Images • PDF.js sheet music</text>
  <text x="170" y="590" font-size="70" font-family="Georgia, serif" fill="#f5c75d">♫</text>
  <text x="1000" y="590" font-size="70" font-family="Georgia, serif" fill="#f5c75d">♬</text>
</svg>
